<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{NAME}} — Resume (Designed)</title>
  <style>
    /* Inline the CSS at build time so the PDF is fully self-contained */
    {{CSS}}
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar: name, contact, skills, education (pulled from parsed sections) -->
    <aside class="sidebar">
      <h1>{{NAME}}</h1>
      <div class="title">{{TITLE}}</div>
      <div class="sidebar-section">
        <h2>Contact</h2>
        {{CONTACT_BLOCK}}
      </div>
      {{SIDEBAR_EXTRA}}
    </aside>

    <!-- Main body: summary, experience, projects, certifications -->
    <main class="main">
      {{MAIN_BODY}}
    </main>
  </div>
</body>
</html>
